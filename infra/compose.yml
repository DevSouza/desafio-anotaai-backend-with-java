# Use root/example as user/password credentials
version: '3.1'

services:
  mongo:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: local_user
      MONGO_INITDB_ROOT_PASSWORD: local_password
  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: local_user
      ME_CONFIG_MONGODB_ADMINPASSWORD: local_password
      ME_CONFIG_MONGODB_URL: mongodb://local_user:local_password@mongo:27017/